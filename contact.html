<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — The Kitchen Couch Podcast</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="page-nav">
    <a href="index.html" class="page-nav-logo">
      <img src="assets/logo.png" alt="The Kitchen Couch" class="hero-nav-logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'" />
      <span class="hero-nav-logo" style="display:none">The Kitchen Couch Podcast</span>
    </a>
    <div class="hero-nav-links">
      <!-- <a href="index.html#kitchen">In The Kitchen</a>
      <a href="index.html#couch">On The Couch</a>
      <a href="index.html#dishes">Menu</a>
      <a href="index.html#about">About Me</a> -->
      <!-- <a href="contact.html">Contact</a> -->
    </div>
  </nav>

  <main class="contact-page">
    <div class="contact-container">
      <h1>Get In Touch</h1>
      <p class="contact-intro">Got a question, recipe idea, or just want to say what's up? Drop a message below.</p>
      <form>
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
        </div>
        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Say hello..."></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </main>

  <footer>
    &copy; 2025-2026 The Kitchen Couch Podcast. All rights reserved.
  </footer>

</body>
</html>
