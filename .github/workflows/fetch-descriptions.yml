name: Fetch YouTube Descriptions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch descriptions from YouTube API
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node .github/fetch-descriptions.js

      - name: Commit descriptions.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add descriptions.json
          git diff --cached --quiet || git commit -m "Update episode descriptions"
          git push
